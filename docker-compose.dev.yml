# ============================================================================
# MyApi - Development Docker Compose (MongoDB + Hot Reload)
# ============================================================================
# Runs the backend with hot-reload (nodemon) and live source mounts.
# Perfect for rapid development with instant file changes.
#
# SETUP:
#   1. Copy .env.docker to .env.local
#   2. Add MONGODB_URI=mongodb+srv://user:pass@cluster.mongodb.net/?appName=MyApi
#   3. Run: docker-compose -f docker-compose.dev.yml up
#
# The backend will live-reload on any change inside src/.
# Frontend: Use `npm run dev` in src/public/dashboard-app for hot-reload.
#
# PORTS:
#   - 4500  → MyApi backend (API + static assets)
#   - 5173  → Vite frontend dev server (optional, run separately)
#
# ============================================================================

services:
  myapi-dev:
    build:
      context: .
      dockerfile: src/Dockerfile
    image: myapi:dev
    container_name: myapi-dev
    restart: unless-stopped

    env_file:
      - .env.local              # Your dev secrets with MONGODB_URI

    environment:
      NODE_ENV: development
      PORT: ${PORT:-4500}
      SESSION_COOKIE_SECURE: "false"
      LOG_LEVEL: debug

    ports:
      - "${PORT:-4500}:4500"    # Backend API

    volumes:
      # Live-mount src/ for hot reload with nodemon
      - ./src:/app/src:cached
      - /app/node_modules        # Keep node_modules inside container

      # Persist logs between restarts
      - myapi-dev-logs:/app/logs

    networks:
      - myapi-dev-network

    # Override CMD to use nodemon for hot-reload
    command: >
      sh -c "npm install &&
             ./node_modules/.bin/nodemon 
             --watch src 
             --ignore src/public 
             --ext js,json 
             src/index.js"

    healthcheck:
      test: ["CMD", "node", "-e",
             "require('http').get('http://localhost:4500/api/v1/', r => { if (r.statusCode !== 200) throw new Error(r.statusCode) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  myapi-dev-logs:
    driver: local

networks:
  myapi-dev-network:
    driver: bridge
