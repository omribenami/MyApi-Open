openapi: 3.1.0
info:
  title: MyApi Personal AI Assistant
  description: |
    Access the user's MyApi account — identity, personas, knowledge base, connected
    services, and their own machines (PCs/servers).

    HOW TO USE SERVICES (do this, don't guess): when the user asks about any connected
    app, their files, their server, docker, or their data —
      1. call listServices to see what's connected and the exact service ids,
      2. call getServiceMethods(serviceId) to learn the exact paths/bodies,
      3. then act: callServiceProxy for normal services, or the /api/v1/afp/* operations
         for the user's own machines (service id "afp").
    Composio-backed services use their plain toolkit name (e.g. gmail, notion) and are
    called exactly like native ones via callServiceProxy. All requests use the user's
    personal OAuth token automatically — never ask the user for credentials.
  version: 1.1.0
servers:
  - url: https://www.myapiai.com

security:
  - oauth2: []

paths:
  # ── Identity ────────────────────────────────────────────────
  /api/v1/identity:
    get:
      operationId: getIdentity
      summary: Get your identity and profile
      description: Returns your personal identity data — name, role, company, bio, and other fields you've stored.
      responses:
        "200":
          description: Identity data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    description: Key-value identity fields
                    additionalProperties: true

  # ── Personas ─────────────────────────────────────────────────
  /api/v1/personas:
    get:
      operationId: listPersonas
      summary: List all AI personas
      description: Returns all configured AI personas for this account, including which one is currently active.
      responses:
        "200":
          description: List of personas
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Persona"

  /api/v1/personas/{id}:
    get:
      operationId: getPersona
      summary: Get a specific persona
      description: Returns the full persona definition including soul content (instructions and personality).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Persona detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Persona"

  # ── Knowledge Base ────────────────────────────────────────────
  /api/v1/brain/knowledge-base:
    get:
      operationId: listKnowledgeDocs
      summary: List knowledge base documents
      description: Returns all documents in your knowledge base — text, PDFs, notes.
      responses:
        "200":
          description: Knowledge base documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KBDocumentSummary"
    post:
      operationId: createKnowledgeDoc
      summary: Create a new knowledge base document
      description: Adds a new document to the knowledge base.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KBDocumentInput"
      responses:
        "200":
          description: Document created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  documentsCreated:
                    type: integer

  /api/v1/brain/knowledge-base/upsert:
    post:
      operationId: upsertKnowledgeDoc
      summary: Create or update a knowledge document by title
      description: |
        Creates a new document or updates an existing one that has the same title.
        Use this to maintain persistent named documents — e.g. call with title "memory.md"
        every time you want to save notes; subsequent calls will update instead of duplicate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KBDocumentInput"
      responses:
        "200":
          description: Document created or updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  action:
                    type: string
                    enum: [created, updated]
                  document:
                    type: object
                    properties:
                      id:
                        type: string
                      title:
                        type: string

  /api/v1/brain/knowledge-base/{id}:
    get:
      operationId: getKnowledgeDoc
      summary: Get full content of a knowledge document
      description: Returns the complete text content of a specific knowledge base document.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full document
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/KBDocument"
    put:
      operationId: updateKnowledgeDoc
      summary: Update an existing knowledge base document
      description: Replaces the content (and optionally title/source) of an existing document by its ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KBDocumentInput"
      responses:
        "200":
          description: Document updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  document:
                    $ref: "#/components/schemas/KBDocument"

  # ── Services ─────────────────────────────────────────────────
  /api/v1/services:
    get:
      operationId: listServices
      summary: List connected services
      description: >
        Call this first when the user asks about a connected app, machine, or data.
        Returns every service id and status. Ids: native (github, google, ...),
        Composio-backed ones under their plain toolkit name (e.g. gmail, notion), and afp (the
        user's own machines). Use the exact id with the other operations.
      responses:
        "200":
          description: Services list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Service"
                  connected:
                    type: integer
                    description: Number of connected services

  # ── Service capability discovery ──────────────────────────────
  /api/v1/services/{serviceName}/methods:
    get:
      operationId: getServiceMethods
      summary: Discover how to call a service
      description: >
        Call before using an unfamiliar service to learn its exact operations, paths,
        and bodies. Works for every id from listServices. For afp it lists the user's
        machines and exec/ls/read/write ops (use /api/v1/afp/* paths, not the proxy);
        for all others it returns the callServiceProxy shape.
      parameters:
        - name: serviceName
          in: path
          required: true
          schema:
            type: string
          description: The exact service id from listServices (e.g. gmail, github, afp)
      responses:
        "200":
          description: Documented operations for the service
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  serviceId:
                    type: string
                  data:
                    type: array
                    description: Documented operations (path, method, params, body shape)
                    items:
                      type: object
                      additionalProperties: true
                  count:
                    type: integer
                  note:
                    type: string
                    description: How to invoke this service's operations
                additionalProperties: true
        "404":
          description: Service not found or not connected

  # ── Service Proxy ─────────────────────────────────────────────
  # Use this to call ANY connected service's API directly.
  # First check listServices to confirm the service is connected before calling.
  /api/v1/services/{serviceName}/proxy:
    post:
      operationId: callServiceProxy
      summary: Call a connected service's API
      description: >
        Proxy a raw API call to any connected service, using the exact id from
        listServices (native or Composio toolkit name). Call getServiceMethods first
        if unsure of the path. MyApi attaches the stored credentials. For afp use
        the /api/v1/afp/* operations, not this proxy.
      parameters:
        - name: serviceName
          in: path
          required: true
          schema:
            type: string
          description: The exact connected service id from listServices (native or Composio toolkit name)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - method
                - path
              properties:
                method:
                  type: string
                  enum: [GET, POST, PUT, DELETE, PATCH]
                path:
                  type: string
                  description: API path on the service (e.g. /user/repos, /conversations.list)
                params:
                  type: object
                  description: Query parameters
                  additionalProperties: true
                body:
                  type: object
                  description: Request body for POST/PUT/PATCH
                  additionalProperties: true
      responses:
        "200":
          description: Response from the service API
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    description: The raw response from the service API
                    additionalProperties: true
                  success:
                    type: boolean
        "404":
          description: Service not connected

  # ── Gmail ────────────────────────────────────────────────────
  /api/v1/services/google/gmail/messages:
    get:
      operationId: listGmailMessages
      summary: List Gmail messages
      description: Returns recent Gmail messages with subject, from, date, and snippet. Supports Gmail search queries.
      parameters:
        - name: maxResults
          in: query
          schema:
            type: integer
            default: 10
            maximum: 20
          description: Number of messages to return (max 20)
        - name: q
          in: query
          schema:
            type: string
          description: Gmail search query (e.g. "is:unread", "from:boss@company.com", "subject:invoice")
        - name: pageToken
          in: query
          schema:
            type: string
          description: Pagination token from a previous response
      responses:
        "200":
          description: Gmail messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/GmailMessage"
                  nextPageToken:
                    type: string
                    nullable: true
                  resultSizeEstimate:
                    type: integer
        "401":
          description: Google not connected or token expired

  /api/v1/services/google/gmail/messages/{id}:
    get:
      operationId: getGmailMessage
      summary: Get full Gmail message
      description: Returns the complete content (body) of a specific Gmail message by ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Gmail message ID (from listGmailMessages)
      responses:
        "200":
          description: Full Gmail message with body
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/GmailMessageFull"
        "401":
          description: Google not connected or token expired

  # ── Google Drive ─────────────────────────────────────────────
  /api/v1/services/google/drive/files:
    get:
      operationId: listDriveFiles
      summary: List Google Drive files
      description: Returns files in the user's Google Drive. Supports Google Drive search queries.
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: "Drive search query (e.g. \"name contains 'report'\", \"mimeType='application/pdf'\")"
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: pageToken
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Drive files
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  files:
                    type: array
                    items:
                      $ref: "#/components/schemas/DriveFile"
                  nextPageToken:
                    type: string
                    nullable: true

  /api/v1/services/google/drive/upload:
    post:
      operationId: uploadDriveFile
      summary: Upload a file to Google Drive
      description: Upload text or binary content as a new file in Google Drive.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - content
              properties:
                name:
                  type: string
                  description: Filename in Drive
                content:
                  type: string
                  description: File content (text or base64)
                mimeType:
                  type: string
                  default: text/plain
                  description: MIME type of the file
                encoding:
                  type: string
                  enum: [utf8, base64]
                  default: utf8
                folderId:
                  type: string
                  description: Optional Drive folder ID to upload into
      responses:
        "200":
          description: File uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  file:
                    $ref: "#/components/schemas/DriveFile"

  /api/v1/services/google/drive/files/{fileId}:
    delete:
      operationId: deleteDriveFile
      summary: Delete a file from Google Drive
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File deleted

  # ── AFP — PC File System Access ───────────────────────────────
  # Requires a registered AFP daemon running on the target PC (master token only).
  /api/v1/afp/devices:
    get:
      operationId: listAfpDevices
      summary: List registered PCs
      description: Returns all PCs with AFP daemon installed, including their online/offline status and platform.
      responses:
        "200":
          description: AFP devices
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  devices:
                    type: array
                    items:
                      $ref: "#/components/schemas/AfpDevice"

  /api/v1/afp/{deviceId}/ls:
    get:
      operationId: afpListDir
      summary: List directory on a remote PC
      description: Returns the contents of a directory on the target PC.
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - name: path
          in: query
          required: true
          schema:
            type: string
          description: Absolute path on the remote PC (e.g. C:\Users or /home/user)
      responses:
        "200":
          description: Directory listing
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AfpEntry"

  /api/v1/afp/{deviceId}/read:
    get:
      operationId: afpReadFile
      summary: Read a file from a remote PC
      description: Returns file content. Binary files are returned as base64.
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File content
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      content:
                        type: string
                      encoding:
                        type: string
                        enum: [utf8, base64]

  /api/v1/afp/{deviceId}/write:
    post:
      operationId: afpWriteFile
      summary: Write a file to a remote PC
      description: Creates or overwrites a file on the target PC.
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - path
                - content
              properties:
                path:
                  type: string
                content:
                  type: string
                encoding:
                  type: string
                  enum: [utf8, base64]
                  default: utf8
      responses:
        "200":
          description: File written

  /api/v1/afp/{deviceId}/exec:
    post:
      operationId: afpExec
      summary: Execute a shell command on a remote PC
      description: Runs a shell command on the target PC and returns stdout/stderr/exitCode. Hard timeout of 60s.
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cmd
              properties:
                cmd:
                  type: string
                  description: Shell command to execute
                cwd:
                  type: string
                  description: Working directory for the command
                timeout:
                  type: integer
                  default: 30000
                  maximum: 60000
                  description: Timeout in milliseconds (max 60000)
      responses:
        "200":
          description: Command result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      stdout:
                        type: string
                      stderr:
                        type: string
                      exitCode:
                        type: integer

  /api/v1/afp/{deviceId}/stat:
    get:
      operationId: afpStat
      summary: Get file/directory metadata on a remote PC
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File metadata

  /api/v1/afp/{deviceId}/rm:
    delete:
      operationId: afpDelete
      summary: Delete a file or directory on a remote PC
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - path
              properties:
                path:
                  type: string
                recursive:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Deleted

  /api/v1/afp/{deviceId}/mkdir:
    post:
      operationId: afpMkdir
      summary: Create a directory on a remote PC
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - path
              properties:
                path:
                  type: string
                recursive:
                  type: boolean
                  default: true
      responses:
        "200":
          description: Directory created

  # ── Brain / Context ───────────────────────────────────────────
  /api/v1/brain/context:
    get:
      operationId: getBrainContext
      summary: Get your full AI context
      description: Returns the assembled context — user profile, active persona, recent memory, and linked knowledge.
      responses:
        "200":
          description: Full context
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    description: Your identity profile
                    additionalProperties: true
                  persona:
                    $ref: "#/components/schemas/Persona"
                  systemPrompt:
                    type: string
                    description: The assembled system prompt used for AI interactions

  # ── Notifications ─────────────────────────────────────────────
  /api/v1/notifications:
    get:
      operationId: listNotifications
      summary: List your notifications
      description: Returns recent notifications for your account.
      parameters:
        - name: unread
          in: query
          schema:
            type: boolean
          description: Filter to unread only
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Notification"

  # ── Memory ───────────────────────────────────────────────────
  # Use these for short-term notes, facts, and observations the AI wants to remember.
  # DO NOT use the knowledge base for this — memory entries are atomic strings, not documents.
  /api/v1/memory:
    get:
      operationId: listMemories
      summary: List all memory entries
      description: Returns all stored memory notes, newest first. Use this to recall what you've previously remembered about the user.
      responses:
        "200":
          description: Memory entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MemoryEntry"
    post:
      operationId: addMemory
      summary: Store a new memory
      description: |
        Save a short fact, note, or observation to memory.
        Use this whenever the user shares something worth remembering (preference, fact, instruction).
        Keep entries concise — one fact per entry.
        IMPORTANT: Use this endpoint for memories, NOT the knowledge base.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
                  description: The memory to store (e.g. "User prefers dark mode", "User's dog is named Max")
      responses:
        "201":
          description: Memory stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/MemoryEntry"

  /api/v1/memory/{id}:
    patch:
      operationId: updateMemory
      summary: Update a memory entry
      description: Update the content of an existing memory by its ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
      responses:
        "200":
          description: Memory updated
    delete:
      operationId: deleteMemory
      summary: Delete a memory entry
      description: Remove a specific memory by its ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Memory deleted

  /api/v1/triggers:
    get:
      operationId: listAutomations
      summary: List the user's automations
      description: Returns scheduled/proactive automations (triggers) the user has created. Requires a Pro or Heavy plan.
      responses:
        "200":
          description: List of automations
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
    post:
      operationId: createAutomation
      summary: Create an automation (scheduled, proactive task)
      description: >
        Schedule a recurring or one-time task that MyApi runs on its own — even when no agent is connected.
        Prefer actionType "ai_prompt": describe the task in plain English and list the connected services it may use;
        an AI agent performs it (and emails via the user's own connected mailbox). Requires a Pro or Heavy plan.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - schedule
                - actionType
                - action
              properties:
                name:
                  type: string
                  description: Human-friendly name for the automation.
                kind:
                  type: string
                  enum: [schedule]
                  default: schedule
                schedule:
                  type: object
                  description: >
                    When to run. type ∈ once|interval|daily|weekly|monthly.
                    once:{at:ISO}; interval:{everyMinutes>=60 for MyApi AI};
                    daily:{atHour,atMinute}; weekly:{weekday(0=Sun),atHour,atMinute}; monthly:{day,atHour,atMinute}.
                  example: { type: daily, atHour: 7, atMinute: 0 }
                timezone:
                  type: string
                  description: IANA timezone (e.g. America/New_York). Defaults to UTC.
                actionType:
                  type: string
                  enum: [ai_prompt, service_proxy, afp_exec]
                  description: ai_prompt = AI agent task (recommended).
                action:
                  type: object
                  description: >
                    For ai_prompt: {prompt, services:[connected service slugs], provider?, model?, keyMode?}.
                    For service_proxy: {service, path, method, body, query}. For afp_exec: {deviceId, cmd}.
                  example: { prompt: "Summarize my unread email and send it to me", services: ["gmail"] }
      responses:
        "201":
          description: Automation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object

  /api/v1/triggers/{id}/run:
    post:
      operationId: runAutomation
      summary: Run an automation now
      description: Execute an automation immediately (useful to test it). Returns the run result.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Run result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  run:
                    type: object

components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://www.myapiai.com/api/v1/oauth-server/authorize
          tokenUrl: https://www.myapiai.com/api/v1/oauth-server/token
          scopes:
            full: Full access to your MyApi account

  schemas:
    Persona:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        soul_content:
          type: string
          description: The persona's instructions and personality definition
        active:
          type: boolean
        created_at:
          type: string
          format: date-time

    KBDocumentInput:
