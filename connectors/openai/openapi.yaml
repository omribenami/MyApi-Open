openapi: 3.1.0
info:
  title: MyApi Personal AI Assistant
  description: |
    Access your MyApi account — identity, personas, knowledge base, and connected services.
    All requests are authenticated with your personal OAuth access token.
  version: 1.0.0
servers:
  - url: https://www.myapiai.com

security:
  - oauth2: []

paths:
  # ── Identity ────────────────────────────────────────────────
  /api/v1/identity:
    get:
      operationId: getIdentity
      summary: Get your identity and profile
      description: Returns your personal identity data — name, role, company, bio, and other fields you've stored.
      responses:
        "200":
          description: Identity data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    description: Key-value identity fields

  # ── Personas ─────────────────────────────────────────────────
  /api/v1/personas:
    get:
      operationId: listPersonas
      summary: List all AI personas
      description: Returns all configured AI personas for this account, including which one is currently active.
      responses:
        "200":
          description: List of personas
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Persona"

  /api/v1/personas/{id}:
    get:
      operationId: getPersona
      summary: Get a specific persona
      description: Returns the full persona definition including soul content (instructions and personality).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Persona detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Persona"

  # ── Knowledge Base ────────────────────────────────────────────
  /api/v1/brain/knowledge-base:
    get:
      operationId: listKnowledgeDocs
      summary: List knowledge base documents
      description: Returns all documents in your knowledge base — text, PDFs, notes.
      responses:
        "200":
          description: Knowledge base documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KBDocumentSummary"
    post:
      operationId: createKnowledgeDoc
      summary: Create a new knowledge base document
      description: Adds a new document to the knowledge base.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KBDocumentInput"
      responses:
        "200":
          description: Document created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  documentsCreated:
                    type: integer

  /api/v1/brain/knowledge-base/upsert:
    post:
      operationId: upsertKnowledgeDoc
      summary: Create or update a knowledge document by title
      description: |
        Creates a new document or updates an existing one that has the same title.
        Use this to maintain persistent named documents — e.g. call with title "memory.md"
        every time you want to save notes; subsequent calls will update instead of duplicate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KBDocumentInput"
      responses:
        "200":
          description: Document created or updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  action:
                    type: string
                    enum: [created, updated]
                  document:
                    type: object
                    properties:
                      id:
                        type: string
                      title:
                        type: string

  /api/v1/brain/knowledge-base/{id}:
    get:
      operationId: getKnowledgeDoc
      summary: Get full content of a knowledge document
      description: Returns the complete text content of a specific knowledge base document.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full document
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/KBDocument"
    put:
      operationId: updateKnowledgeDoc
      summary: Update an existing knowledge base document
      description: Replaces the content (and optionally title/source) of an existing document by its ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KBDocumentInput"
      responses:
        "200":
          description: Document updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  document:
                    $ref: "#/components/schemas/KBDocument"

  # ── Services ─────────────────────────────────────────────────
  /api/v1/services:
    get:
      operationId: listServices
      summary: List connected services
      description: Returns all available integrations and which ones are currently connected (Google, GitHub, Slack, etc.).
      responses:
        "200":
          description: Services list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Service"
                  connected:
                    type: integer
                    description: Number of connected services

  # ── Service Proxy ─────────────────────────────────────────────
  # Use this to call ANY connected service's API directly.
  # First check listServices to confirm the service is connected before calling.
  /api/v1/services/{serviceName}/proxy:
    post:
      operationId: callServiceProxy
      summary: Call a connected service's API
      description: "Proxy a raw API call to any connected OAuth service (GitHub, Slack, Notion, etc.). Call listServices first to confirm the service is connected. Examples: GitHub repos → GET /user/repos, Slack channels → GET /conversations.list, Notion → POST /search."
      parameters:
        - name: serviceName
          in: path
          required: true
          schema:
            type: string
            enum: [github, google, slack, discord, linkedin, notion, dropbox, facebook, instagram, twitter, microsoft365, trello, zoom, hubspot, salesforce, jira]
          description: The connected service to call
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - method
                - path
              properties:
                method:
                  type: string
                  enum: [GET, POST, PUT, DELETE, PATCH]
                path:
                  type: string
                  description: API path on the service (e.g. /user/repos, /conversations.list)
                params:
                  type: object
                  description: Query parameters
                  additionalProperties: true
                body:
                  type: object
                  description: Request body for POST/PUT/PATCH
                  additionalProperties: true
      responses:
        "200":
          description: Response from the service API
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    description: The raw response from the service API
                  success:
                    type: boolean
        "404":
          description: Service not connected

  # ── Gmail ────────────────────────────────────────────────────
  /api/v1/services/google/gmail/messages:
    get:
      operationId: listGmailMessages
      summary: List Gmail messages
      description: Returns recent Gmail messages with subject, from, date, and snippet. Supports Gmail search queries.
      parameters:
        - name: maxResults
          in: query
          schema:
            type: integer
            default: 10
            maximum: 20
          description: Number of messages to return (max 20)
        - name: q
          in: query
          schema:
            type: string
          description: Gmail search query (e.g. "is:unread", "from:boss@company.com", "subject:invoice")
        - name: pageToken
          in: query
          schema:
            type: string
          description: Pagination token from a previous response
      responses:
        "200":
          description: Gmail messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/GmailMessage"
                  nextPageToken:
                    type: string
                    nullable: true
                  resultSizeEstimate:
                    type: integer
        "401":
          description: Google not connected or token expired

  /api/v1/services/google/gmail/messages/{id}:
    get:
      operationId: getGmailMessage
      summary: Get full Gmail message
      description: Returns the complete content (body) of a specific Gmail message by ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Gmail message ID (from listGmailMessages)
      responses:
        "200":
          description: Full Gmail message with body
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/GmailMessageFull"
        "401":
          description: Google not connected or token expired

  # ── Brain / Context ───────────────────────────────────────────
  /api/v1/brain/context:
    get:
      operationId: getBrainContext
      summary: Get your full AI context
      description: Returns the assembled context — user profile, active persona, recent memory, and linked knowledge.
      responses:
        "200":
          description: Full context
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    description: Your identity profile
                  persona:
                    $ref: "#/components/schemas/Persona"
                  systemPrompt:
                    type: string
                    description: The assembled system prompt used for AI interactions

  # ── Notifications ─────────────────────────────────────────────
  /api/v1/notifications:
    get:
      operationId: listNotifications
      summary: List your notifications
      description: Returns recent notifications for your account.
      parameters:
        - name: unread
          in: query
          schema:
            type: boolean
          description: Filter to unread only
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Notification"

  # ── Memory ───────────────────────────────────────────────────
  # Use these for short-term notes, facts, and observations the AI wants to remember.
  # DO NOT use the knowledge base for this — memory entries are atomic strings, not documents.
  /api/v1/memory:
    get:
      operationId: listMemories
      summary: List all memory entries
      description: Returns all stored memory notes, newest first. Use this to recall what you've previously remembered about the user.
      responses:
        "200":
          description: Memory entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MemoryEntry"
    post:
      operationId: addMemory
      summary: Store a new memory
      description: |
        Save a short fact, note, or observation to memory.
        Use this whenever the user shares something worth remembering (preference, fact, instruction).
        Keep entries concise — one fact per entry.
        IMPORTANT: Use this endpoint for memories, NOT the knowledge base.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
                  description: The memory to store (e.g. "User prefers dark mode", "User's dog is named Max")
      responses:
        "201":
          description: Memory stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/MemoryEntry"

  /api/v1/memory/{id}:
    patch:
      operationId: updateMemory
      summary: Update a memory entry
      description: Update the content of an existing memory by its ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
      responses:
        "200":
          description: Memory updated
    delete:
      operationId: deleteMemory
      summary: Delete a memory entry
      description: Remove a specific memory by its ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Memory deleted

components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://www.myapiai.com/api/v1/oauth-server/authorize
          tokenUrl: https://www.myapiai.com/api/v1/oauth-server/token
          scopes:
            full: Full access to your MyApi account

  schemas:
    Persona:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        soul_content:
          type: string
          description: The persona's instructions and personality definition
        active:
          type: boolean
        created_at:
          type: string
          format: date-time

    KBDocumentInput:
      type: object
      required:
        - title
        - content
      properties:
        title:
          type: string
          description: Document title (used as unique key for upsert)
        content:
          type: string
          description: Full document content (markdown or plain text)
        source:
          type: string
          description: Source label, e.g. "agent", "chatgpt", "manual"
          default: agent

    KBDocumentSummary:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        source:
          type: string
        content_preview:
          type: string
          description: First ~200 characters of the document
        created_at:
          type: string
          format: date-time

    KBDocument:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        source:
          type: string
        content:
          type: string
          description: Full document text
        created_at:
          type: string
          format: date-time

    Service:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        status:
          type: string
          enum: [connected, available]
        connectedAt:
          type: string
          format: date-time
          nullable: true

    GmailMessage:
      type: object
      properties:
        id:
          type: string
        threadId:
          type: string
        subject:
          type: string
        from:
          type: string
        to:
          type: string
        date:
          type: string
        snippet:
          type: string
          description: Short preview of message content
        labelIds:
          type: array
          items:
            type: string

    GmailMessageFull:
      type: object
      properties:
        id:
          type: string
        threadId:
          type: string
        subject:
          type: string
        from:
          type: string
        to:
          type: string
        date:
          type: string
        snippet:
          type: string
        body:
          type: string
          description: Full message body (plain text)
        labelIds:
          type: array
          items:
            type: string

    Notification:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        message:
          type: string
        type:
          type: string
        read:
          type: boolean
        created_at:
          type: string
          format: date-time

    MemoryEntry:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
          description: The stored memory (a short fact or note)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
