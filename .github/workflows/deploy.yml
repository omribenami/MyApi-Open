# =============================================================================
# MyApi Deploy Pipeline
# Auto-deploys on push to main branch after CI passes
# Supports Docker-based deployment with pre-deploy backup and migration
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # Run CI first
  # ===========================================================================
  ci:
    uses: ./.github/workflows/ci.yml

  # ===========================================================================
  # Deploy
  # ===========================================================================
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    needs: [ci]
    # SOC 2 Phase 3.2 — Production Deployment Approval Gate
    # The `environment: production` key activates GitHub's environment protection rules.
    # To enforce a required reviewer before any production deploy:
    #   Settings → Environments → production → Required reviewers → add approver(s)
    # Without that setting this job runs automatically; with it, GitHub blocks until approved.
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        working-directory: src/public/dashboard-app
        run: |
          npm ci
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        if: vars.REGISTRY_URL != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/Dockerfile
          push: ${{ vars.REGISTRY_URL != '' }}
          tags: |
            ${{ vars.REGISTRY_URL && format('{0}/myapi-backend:latest', vars.REGISTRY_URL) || 'myapi-backend:latest' }}
            ${{ vars.REGISTRY_URL && format('{0}/myapi-backend:{1}', vars.REGISTRY_URL, github.sha) || format('myapi-backend:{0}', github.sha) }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        if: vars.DEPLOY_HOST != ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ vars.DEPLOY_PATH || '/opt/MyApi' }}
            bash deploy.sh
            echo "=== Deployment complete ==="

      - name: Verify deployment
        if: vars.DEPLOY_URL != ''
        run: |
          echo "Waiting for deployment to become healthy..."
          for i in {1..30}; do
            if curl -sf "${{ vars.DEPLOY_URL }}/health" > /dev/null 2>&1; then
              echo "✅ Deployment healthy!"
              exit 0
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 10
          done
          echo "❌ Deployment health check failed"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed for commit ${{ github.sha }}"
          echo "Check the deployment logs and consider rolling back."
