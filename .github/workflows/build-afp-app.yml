# =============================================================================
# AFP Desktop App Build Pipeline
# Builds Windows NSIS installer and uploads to GitHub Releases.
# macOS builds are coming soon (pending Apple Developer certificate).
#
# Trigger:
#   git tag afp-app-v1.0.0 && git push --tags
#   OR: Actions → Build AFP Desktop App → Run workflow
#
# Signing (optional — skip for unsigned dev builds):
#   Win: set WIN_CERT_B64 (base64 .pfx), WIN_CERT_PASSWORD
# =============================================================================

name: Build AFP Desktop App

on:
  push:
    branches:
      - main
    tags:
      - 'afp-app-v*'
    paths:
      - 'connectors/afp-app/**'
      - 'connectors/afp-oauth/**'
      - 'connectors/afp-daemon/**'
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: true

permissions:
  contents: write   # required to create releases + upload assets

jobs:
  # ─── Windows Build ───────────────────────────────────────────────────────────
  build-win:
    name: Build Windows (x64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: connectors/afp-app
        run: npm ci

      - name: Decode signing cert (if present)
        shell: pwsh
        env:
          WIN_CERT_B64: ${{ secrets.WIN_CERT_B64 }}
        run: |
          if ($env:WIN_CERT_B64) {
            $bytes = [Convert]::FromBase64String($env:WIN_CERT_B64)
            [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\myapi-cert.pfx", $bytes)
            echo "WIN_CERT_PATH=$env:RUNNER_TEMP\myapi-cert.pfx" >> $env:GITHUB_ENV
          } else {
            Write-Host "No WIN_CERT_B64 secret — skipping signing."
          }

      - name: Build NSIS installer
        working-directory: connectors/afp-app
        run: npm run build:win
        env:
          WIN_CERT_PATH:     ${{ env.WIN_CERT_PATH || '' }}
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD || '' }}

      - name: Rename artifact to fixed name
        working-directory: connectors/afp-app/dist
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Filter "*.exe" | Where-Object { $_.Name -notmatch 'Uninstall' } | Select-Object -First 1
          if ($exe) {
            Rename-Item $exe.FullName "MyApi-AFP-win-x64.exe"
            Write-Host "renamed: $($exe.Name)"
          } else {
            Write-Error "No installer .exe found in dist/"
          }
          Get-ChildItem *.exe | Format-Table Name, Length

      - name: Upload win artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: connectors/afp-app/dist/MyApi-AFP-win-x64.exe
          retention-days: 7

  # ─── macOS Build (x64 + arm64) ───────────────────────────────────────────────
  # Signs + notarizes when the Apple Developer secrets are present; otherwise
  # produces an unsigned .dmg (open via right-click → Open the first time).
  # Required secrets for signing/notarization: CSC_LINK (base64 .p12),
  # CSC_KEY_PASSWORD, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID.
  build-mac:
    name: Build macOS (x64 + arm64)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: connectors/afp-app
        run: npm ci

      - name: Build DMGs (signed + notarized if Apple secrets set)
        working-directory: connectors/afp-app
        run: npm run build:mac
        env:
          CSC_LINK:                    ${{ secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD:            ${{ secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID:                    ${{ secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID || '' }}

      - name: Rename artifacts to fixed names
        working-directory: connectors/afp-app/dist
        run: |
          arm=$(ls *arm64*.dmg 2>/dev/null | head -1 || true)
          x64=$(ls *.dmg 2>/dev/null | grep -v arm64 | head -1 || true)
          [ -n "$arm" ] && mv "$arm" "MyApi-AFP-mac-arm64.dmg" && echo "arm64: $arm"
          [ -n "$x64" ] && mv "$x64" "MyApi-AFP-mac-x64.dmg" && echo "x64: $x64"
          ls -la *.dmg

      - name: Upload mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: |
            connectors/afp-app/dist/MyApi-AFP-mac-arm64.dmg
            connectors/afp-app/dist/MyApi-AFP-mac-x64.dmg
          retention-days: 7
          if-no-files-found: warn

  # ─── Deploy to server ────────────────────────────────────────────────────────
  deploy:
    name: Deploy installers to server
    runs-on: ubuntu-latest
    needs: [build-win, build-mac]
    # Hosted-infra step: only the private repo has the SSH deploy secrets.
    # Forks and MyApi Open still build the installers above.
    if: github.repository == 'omribenami/MyApi'

    steps:
      - name: Download win artifact
        uses: actions/download-artifact@v8
        with:
          name: win-exe
          path: dist/

      - name: Download mac artifacts
        uses: actions/download-artifact@v8
        with:
          name: mac-dmg
          path: dist/
        continue-on-error: true

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Upload installers to server
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p /opt/MyApi/connectors/afp-app/dist"
          for f in MyApi-AFP-win-x64.exe MyApi-AFP-mac-arm64.dmg MyApi-AFP-mac-x64.dmg; do
            if [ -f "dist/$f" ]; then
              scp -i ~/.ssh/id_ed25519 "dist/$f" \
                ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/MyApi/connectors/afp-app/dist/"$f"
              echo "uploaded $f"
            fi
          done
          echo "Deployed successfully"
