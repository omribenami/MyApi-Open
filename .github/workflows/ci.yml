# =============================================================================
# MyApi CI Pipeline
# Runs tests, linting, and security checks on every push and pull request
# =============================================================================

name: CI

on:
  # NOTE: `main` is intentionally excluded from the push trigger.
  # Pushes to main run CI via deploy.yml (which calls this workflow with
  # `workflow_call`). Triggering standalone CI on main too would land both
  # runs in the same `ci-refs/heads/main` concurrency group and cancel each
  # other, killing the deploy. PRs targeting main still get CI below.
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]
  workflow_call: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Lint & Type Check
  # ===========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        working-directory: src/public/dashboard-app
        run: |
          npm ci
          npm run lint

  # ===========================================================================
  # Backend Tests
  # ===========================================================================
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Prebuilt better-sqlite3 binary requires GLIBC_2.38, which is not present
      # on the GitHub-hosted runner image used for the Node 20 lane. Rebuild
      # from source against the runner's actual glibc (mirrors src/Dockerfile).
      - name: Rebuild native modules from source
        run: npm rebuild better-sqlite3 --build-from-source

      - name: Run tests
        run: npm test ${{ matrix.node-version == '22' && '--coverage' || '' }}
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-ci
          ENCRYPTION_KEY: test-encryption-key-32chars!!
          SESSION_SECRET: test-session-secret-ci
          VAULT_KEY: test-vault-key-ci-32characters!
          DB_PATH: ':memory:'

      - name: Upload coverage
        if: matrix.node-version == '22'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ===========================================================================
  # Security Audit
  # ===========================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high || true

  # ===========================================================================
  # Docker Build Validation
  # ===========================================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create placeholder connector dist dirs
        run: mkdir -p connectors/afp-daemon/dist connectors/afp-oauth/dist

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/Dockerfile
          push: false
          tags: myapi-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

