<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>MyApi Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{--bg:#0b1020;--card:#141a31;--text:#e5e7eb;--muted:#a0aec0;--accent:#4f46e5}
    html,body{height:100%;margin:0;background:var(--bg);font-family:Inter, system-ui, -apple-system, Arial}
    .container{max-width:1000px;margin:40px auto;padding:0 16px}
    .card{background:var(--card);border-radius:12px;padding:16px 16px 20px;margin-bottom:20px;box-shadow:0 6px 20px rgba(0,0,0,.25)}
    h2{font-size:20px;margin:0 0 8px}
    label{display:block;margin:8px 0 4px;font-size:12px;color:var(--muted)}
    input, textarea, select{width:100%;padding:10px;border-radius:6px;border:1px solid #334155;background:#0f1b2a;color:#e2e8f0}
    button{padding:10px 14px;border-radius:6px;border:none;background:var(--accent);color:white;cursor:pointer}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:8px 6px;border-bottom:1px solid #2e3a66;text-align:left;font-family:inherit}
    .hidden{display:none}
    .token{font-family:monospace}
  </style>
</head>
<body>
  <div class="container">
    <div class="card" id="loginCard">
      <h2>Login</h2>
      <p class="muted">Enter your master token to unlock the dashboard.</p>
      <label>Master Token</label>
      <input id="masterToken" type="password" placeholder="Master token" />
      <button id="loginBtn">Login</button>
      <p id="loginStatus" class="muted"></p>
    </div>

    <div class="card" id="mainCard" style="display:none">
      <h2>MyApi Admin Dashboard</h2>
      <div class="grid">
        <section id="vaultSection" class="card" style="min-height:120px">
          <h3>Vault Tokens</h3>
          <div>
            <label>Label</label>
            <input id="vtLabel" type="text" placeholder="e.g. GitHub" />
            <label>Description</label>
            <input id="vtDesc" type="text" placeholder="Optional description" />
            <label>Token</label>
            <input id="vtToken" type="text" placeholder="Secret value" />
            <label>Scope</label>
            <select id="vtScope"><option value="read">read</option><option value="professional">professional</option><option value="availability">availability</option><option value="full">full</option></select>
            <button id="vtAdd">Add Vault Token</button>
          </div>
          <div style="margin-top:12px;max-height:180px;overflow:auto">
            <table id="vaultTable"><thead><tr><th>ID</th><th>Label</th><th>Scope</th><th>Created</th><th>Preview</th><th>Actions</th></tr></thead><tbody></tbody></table>
          </div>
        </section>
        <section id="handshakeSection" class="card" style="min-height:120px">
          <h3>Handshake Center</h3>
          <div>
            <button id="refreshHandshakes">Refresh Pending</button>
          </div>
          <div style="margin-top:8px;max-height:180px;overflow:auto">
            <table id="handshakeTable"><thead><tr><th>ID</th><th>User</th><th>Agent</th><th>Scopes</th><th>Message</th><th>Status</th><th>Actions</th></tr></thead><tbody></tbody></table>
          </div>
        </section>
      </div>
      <button id="logoutBtn" style="margin-top:12px;background:#e11d48">Logout</button>
    </div>
  </div>
  <script src="/dashboard/app.js"></script>
</body>
</html>
