version: '3.8'

services:
  myapi:
    build: .
    container_name: myapi-platform
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-myapi-production-secret-change-this}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-MyApi-Secure-32Char-EncryptKey!!}
      - DB_PATH=/app/data/myapi.db
      - USER_MD_PATH=/app/data/USER.md
      - ALLOWED_ORIGINS=http://localhost:3001,http://192.168.1.253:3001
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - myapi-network

networks:
  myapi-network:
    driver: bridge
