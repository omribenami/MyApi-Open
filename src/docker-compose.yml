version: '3.8'

services:
  myapi:
    build:
      context: ..
      dockerfile: src/Dockerfile
    container_name: myapi-platform

    # Port mapping
    # SECURITY FIX (MEDIUM - CVSS 5.3): Restrict port binding to localhost in production
    # Only expose to internal network; use reverse proxy/load balancer for external access
    ports:
      - \"127.0.0.1:${PORT:-4500}:${PORT:-4500}\"

    # SECURITY FIX (MEDIUM - CVSS 6.5): Load environment variables securely
    # Only load from .env file (filtered for secrets), not raw environment
    # This prevents unintended environment variable leakage from the host
    env_file:
      - ../.env

    # Only override vars that must be different inside the container
    # (filesystem paths, runtime mode).  Do NOT duplicate secrets or
    # production URLs here — they come correctly from env_file above.
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-4500}
      - DB_PATH=/app/data/myapi.db
      - SESSION_DB_PATH=/app/data/sessions.db
      - USER_MD_PATH=/app/data/USER.md
      - SOUL_MD_PATH=/app/data/SOUL.md

    # Persistent volumes for SQLite and logs
    volumes:
      # SQLite database - bind mount to host so data survives rebuilds
      - /opt/MyApi/data:/app/data
      # Application logs
      - myapi-logs:/app/logs
      # AFP desktop app installers - deployed by CI
      - /opt/MyApi/connectors/afp-app/dist:/app/connectors/afp-app/dist:ro

    # Restart policy
    restart: unless-stopped

    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${PORT:-4500}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Network
    networks:
      - myapi-network

# Named volumes
volumes:
  myapi-logs:
    driver: local

networks:
  myapi-network:
    driver: bridge
