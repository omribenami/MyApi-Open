version: '3.8'

services:
  myapi:
    build:
      context: ..
      dockerfile: src/Dockerfile
    container_name: myapi-platform

    # Port mapping
    ports:
      - "${PORT:-4500}:${PORT:-4500}"

    # Load all env vars from root .env file
    env_file:
      - ../.env

    # Only override vars that must be different inside the container
    # (filesystem paths, runtime mode).  Do NOT duplicate secrets or
    # production URLs here — they come correctly from env_file above.
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-4500}
      - DB_PATH=/app/data/myapi.db
      - USER_MD_PATH=/app/data/USER.md

    # Persistent volumes for SQLite and logs
    volumes:
      # SQLite database - bind mount to host so data survives rebuilds
      - /opt/MyApi/data:/app/data
      # Application logs
      - myapi-logs:/app/logs

    # Restart policy
    restart: unless-stopped

    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${PORT:-4500}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Network
    networks:
      - myapi-network

# Named volumes
volumes:
  myapi-logs:
    driver: local

networks:
  myapi-network:
    driver: bridge
