<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/dashboard/myapi-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyApi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet" />
    <script>
      // Apply saved theme before first paint to avoid flash
      (function(){
        try {
          var prefs = JSON.parse(localStorage.getItem('myapi-ui-prefs') || '{}');
          var html = document.documentElement;
          html.setAttribute('data-theme', prefs.theme || 'dark');
          html.setAttribute('data-accent', prefs.accent || 'blue');
          html.setAttribute('data-density', prefs.density || 'normal');
        } catch(e){}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script src="/dashboard/cache-bust.js"></script>
    <script type="module" src="/src/main.jsx" onerror="window.__myapiAssetError()"></script>
  </body>
</html>
